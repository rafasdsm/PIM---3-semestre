<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Café Pontes</title>
  </head>
  <body>
    <!--
        API do governo de libras
    -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>
    <!----------------------------------------------------------------------------------------------------------->
    <header>
      <a href="index.html" target="_self">
        <button><</button>
      </a>
      <h1>Café Pontes</h1>
      <button>
        <i class="fas fa-shopping-cart"></i>
      </button>
    </header>
    <main>
      <article
        style="
          margin: 10px;
          display: flex;
          flex-direction: column;
          width: 250px;
          text-align: center;
        "
      >
        <div
          style="
            width: 250px;
            height: 237px;
            background-image: url(&quot;../Midia/item1.png&quot;);
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
          "
        ></div>

        <p>Soda italiana de morango com toque cítrico da laranja e menta →</p>

        <div
          style="
            display: flex;
            flex-direction: row;
            justify-content: space-between;
          "
        >
          <button
            style="
              font-size: 25px;
              border: 1px solid black;
              border-radius: 50%;
              width: 30px;
              height: 30px;
              cursor: pointer;
              background-color: transparent;
              color: green;
            "
          >
            +
          </button>

          <p></p>

          <button
            style="
              font-size: 25px;
              border: 1px solid black;
              border-radius: 50%;
              width: 30px;
              height: 30px;
              cursor: pointer;
              background-color: transparent;
              color: red;
            "
          >
            -
          </button>
        </div>
      </article>
    </main>
  </body>

  <link rel="stylesheet" href="Estilos/all.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
  <link rel="stylesheet" href="Estilos/cardapio.css" />
  <script src="Script/cardapio.js"></script>
</html>
